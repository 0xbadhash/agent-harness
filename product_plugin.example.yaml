# Product plugin — copy to .agents/product_plugin.yaml in YOUR product repo.
# Stack is chosen here. The harness does not assume a language or framework.

product_id: my-product
product_name: My Product
repo_root: .

# Free-form metadata for the agent (not executed)
stack:
  languages: []          # e.g. [typescript], [python], [go], [rust], …
  package_manager: ""    # e.g. pnpm, npm, poetry, cargo, go
  test_runners: []       # e.g. [vitest], [pytest], [go test]
  app_layout: ""         # e.g. src/, app/, cmd/+internal/

product_roadmap: ROADMAP.md
harness_backlog: .agents/BACKLOG.md

# Executed at release / smoke (argv arrays; cwd relative to product root)
smoke:
  - name: unit
    cmd: ["echo", "replace-with-your-test-command"]
    cwd: .
  # - name: typecheck
  #   cmd: ["your", "typechecker"]
  #   cwd: .

# Optional knowledge vault for release notes
vault:
  root_env: PRODUCT_VAULT_ROOT
  default_root: ""
  dev_log_rel: 01-Projects/my-product/dev-log.md
  project_label: my-product

# Paths that count as product code (large-diff / review heuristics)
product_path_prefixes:
  - src/

domain_review_hints:
  - domain correctness
  - no secret leakage

# Names of skills that exist only in this product (not in agent-harness)
product_skills: []
