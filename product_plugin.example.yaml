# Product plugin — copy to .agents/product_plugin.yaml in YOUR product repo.
# Stack is chosen here. The harness does not assume a language or framework.

product_id: my-product
product_name: My Product
repo_root: .

# Free-form metadata for the agent (not executed)
stack:
  languages: []          # e.g. [typescript], [python], [go], [rust], …
  package_manager: ""    # e.g. pnpm, npm, poetry, cargo, go
  test_runners: []       # e.g. [vitest], [pytest], [go test]
  app_layout: ""         # e.g. src/, app/, cmd/+internal/

product_roadmap: ROADMAP.md
harness_backlog: .agents/BACKLOG.md

# Executed at release / smoke (argv arrays; cwd relative to product root)
smoke:
  - name: unit
    cmd: ["echo", "replace-with-your-test-command"]
    cwd: .

# Optional knowledge vault (second-brain / Obsidian / anything).
# DEFAULT: disabled — this public harness is vault-agnostic.
# Enable only on machines that have a vault; never commit secrets or host-only paths
# as required defaults for all consumers of this plugin file.
vault:
  enabled: false
  root_env: PRODUCT_VAULT_ROOT   # set this env var when enabled
  default_root: ""               # leave empty in committed examples
  project_label: my-product
  dev_log_rel: 01-Projects/my-product/dev-log.md
  # optional allowlist of repo-relative docs; empty → product discovery defaults
  mirror_docs: []

product_path_prefixes:
  - src/

domain_review_hints:
  - domain correctness
  - no secret leakage

# Optional overnight readiness (scripts/night_shift_readiness.py — harness SoT)
# Full ops: docs/night-shift.md  ·  multi-product timer: deploy/night-shift-all.*
night_shift:
  default_host: ""          # e.g. app.example.com (no scheme); or set PRODUCT_BASE_URL
  live_path: ""             # path under https://default_host
  live_urls: []             # full URLs for HTTP probes
  live_expect_code: "200"
  coverage_soft: "1"        # "0" = hard-fail if coverage tooling missing

# Skills that exist only in this product (not in agent-harness)
product_skills: []
